<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción de Camionetas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --steel-900:#132630;
    --steel-800:#1B3A4B;
    --steel-700:#274C60;
    --concrete:#F1EEE7;
    --panel:#FFFFFF;
    --graphite:#24303A;
    --graphite-soft:#5B6B75;
    --amber:#E8A33D;
    --amber-dark:#C9821F;
    --green:#3F8F63;
    --green-bg:#E6F2EB;
    --red:#C1502E;
    --red-bg:#FBE9E3;
    --gray-bg:#EDEBE5;
    --line:#DCD7CC;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--concrete);
    color:var(--graphite);
    font-family:'Inter',sans-serif;
    padding:0 0 60px 0;
  }
  .wrap{max-width:900px;margin:0 auto;padding:0 20px;}

  /* HEADER / TAG */
  .tag{
    background:#fff;
    color:var(--graphite);
    padding:24px 24px 20px;
    border-radius:0 0 18px 18px;
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  .tag::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;height:6px;
    background:repeating-linear-gradient(90deg, var(--amber) 0 22px, var(--steel-800) 22px 44px);
    opacity:.9;
  }
  .tag-top{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-top:8px;flex-wrap:wrap;gap:12px;
  }
  .tag-brand{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .brand-logo{
    height:46px;width:auto;flex:none;
  }
  .tag h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;font-size:clamp(24px,4vw,32px);
    text-transform:uppercase;letter-spacing:.01em;
    margin:0;line-height:1.05;color:var(--steel-800);
  }
  .progress-row{margin-top:18px;}
  .progress-row .plabel{
    display:flex;justify-content:space-between;font-size:12px;
    color:var(--graphite-soft);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;
  }
  .progress-track{height:8px;background:var(--gray-bg);border-radius:5px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber-dark),var(--amber));transition:width .4s ease;}

  /* SECTIONS */
  section.card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-top:22px;
    overflow:hidden;
  }
  .card-head{
    display:flex;align-items:center;gap:10px;
    padding:16px 20px;border-bottom:1px solid var(--line);
    background:var(--gray-bg);
  }
  .card-head .idx{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;font-weight:600;color:#fff;
    background:var(--steel-800);
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    flex:none;
  }
  .card-head h2{
    font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;
    text-transform:uppercase;letter-spacing:.03em;margin:0;color:var(--steel-800);
  }
  .card-body{padding:18px 20px 22px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px 16px;}
  .field label{
    display:block;font-size:11px;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;color:var(--graphite-soft);margin-bottom:5px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    font-family:'Inter',sans-serif;font-size:14px;color:var(--graphite);
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:7px;
    padding:9px 10px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field.mono input{font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--steel-700);}
  .field textarea{resize:vertical;min-height:64px;}
  .field input[readonly]{background:var(--gray-bg);color:var(--graphite-soft);}

  .subgroup-title{
    font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--amber-dark);
    margin:18px 0 10px;padding-bottom:6px;border-bottom:1px dashed var(--line);
  }
  .subgroup-title:first-child{margin-top:0;}

  .hint{font-size:12px;color:var(--graphite-soft);margin-top:6px;}

  /* Plate lookup */
  .plate-field{position:relative;}
  .plate-status{
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    margin-top:6px;display:flex;align-items:center;gap:6px;min-height:16px;
  }
  .plate-status.found{color:var(--green);}
  .plate-status.new{color:var(--amber-dark);}
  .plate-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none;}

  /* Declaration table */
  .decl-table{width:100%;border-collapse:collapse;margin-top:4px;}
  .decl-table thead th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:.05em;color:var(--graphite-soft);
    padding:8px 8px;border-bottom:1.5px solid var(--line);
  }
  .decl-table td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .decl-table td.comp-cell{font-size:14px;font-weight:500;white-space:nowrap;}
  .decl-table select{
    font-family:'Inter',sans-serif;font-size:13.5px;padding:7px 8px;border:1.5px solid var(--line);
    border-radius:6px;background:#fff;min-width:130px;
  }
  .decl-table select.val-si, .decl-table select.val-buena, .decl-table select.val-realiza{border-color:var(--green);color:var(--green);}
  .decl-table select.val-no, .decl-table select.val-mala, .decl-table select.val-norealiza{border-color:var(--red);color:var(--red);}
  .decl-table input.detalle{
    width:100%;font-size:13px;padding:7px 9px;border:1.5px solid var(--line);border-radius:6px;
  }
  .decl-group-row td{
    padding-top:16px;padding-bottom:4px;border-bottom:none;
    font-family:'Oswald',sans-serif;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--amber-dark);
  }
  @media (max-width:640px){
    .decl-table thead{display:none;}
    .decl-table, .decl-table tbody, .decl-table tr, .decl-table td{display:block;width:100%;}
    .decl-table tr{border-bottom:1px solid var(--line);padding:10px 0;}
    .decl-table td{border-bottom:none;padding:4px 0;}
    .decl-table td.comp-cell{font-weight:600;}
    .decl-group-row{border-bottom:1px dashed var(--line);}
  }

  /* Signatures */
  .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:600px){.sig-grid{grid-template-columns:1fr;}}
  .sig-box{border:1.5px dashed var(--line);border-radius:8px;padding:12px;text-align:center;}
  .sig-box .sig-title{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--graphite-soft);font-weight:600;margin-bottom:8px;}
  canvas.sig-pad{
    width:100%;height:130px;background:#FAFAF7;border-radius:6px;border:1px solid var(--line);
    touch-action:none;cursor:crosshair;
  }
  .sig-actions{margin-top:8px;display:flex;justify-content:center;gap:8px;}
  .mini-btn{
    font-size:11px;font-family:'IBM Plex Mono',monospace;
    background:none;border:1px solid var(--line);color:var(--graphite-soft);
    padding:4px 10px;border-radius:5px;cursor:pointer;
  }
  .mini-btn:hover{border-color:var(--steel-700);color:var(--steel-800);}
  .sig-name{margin-top:10px;}

  /* Result banner */
  .result-banner{
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    padding:16px 20px;border-radius:var(--radius);margin-top:22px;
    border:1.5px solid var(--line);background:var(--panel);
  }
  .result-banner.ok{border-color:var(--green);background:var(--green-bg);}
  .result-banner.warn{border-color:var(--red);background:var(--red-bg);}
  .result-banner .rb-label{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:15px;letter-spacing:.03em;}
  .result-banner .rb-sub{font-size:12px;color:var(--graphite-soft);margin-top:2px;}

  /* Action bar */
  .actions{
    display:flex;gap:12px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap;
  }
  .btn{
    font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
    font-size:14px;padding:12px 22px;border-radius:8px;border:none;cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--steel-800);color:#fff;}
  .btn-primary:hover{background:var(--steel-900);}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--graphite-soft);}
  .btn-ghost:hover{border-color:var(--red);color:var(--red);}

  /* Fleet manager */
  .fleet-toggle{
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;background:var(--gray-bg);border:1px solid var(--line);
    color:var(--steel-800);padding:7px 12px;border-radius:7px;cursor:pointer;margin-top:14px;margin-right:8px;
  }
  .fleet-toggle:hover{background:var(--line);}
  .fleet-panel{display:none;}
  .fleet-panel.open{display:block;}
  .fleet-import textarea{
    width:100%;min-height:80px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    border:1.5px solid var(--line);border-radius:7px;padding:9px 10px;resize:vertical;
  }
  .fleet-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  table.fleet-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;}
  table.fleet-table th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--graphite-soft);border-bottom:1.5px solid var(--line);padding:8px 6px;
  }
  table.fleet-table td{padding:8px 6px;border-bottom:1px solid var(--line);}
  table.fleet-table td.plate-cell{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .row-del{
    background:none;border:1px solid var(--line);color:var(--graphite-soft);
    font-size:11px;padding:4px 8px;border-radius:5px;cursor:pointer;
  }
  .row-del:hover{border-color:var(--red);color:var(--red);}
  .fleet-empty{font-size:13px;color:var(--graphite-soft);padding:14px 0;}
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--steel-800);color:#fff;font-size:13px;font-family:'Inter',sans-serif;
    padding:10px 18px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media print{
    body{background:#fff;padding:0;}
    .actions, .fleet-toggle, .fleet-panel, .toast{display:none;}
    .tag{border-radius:0;}
    section.card{break-inside:avoid;border-color:#999;}
  }
</style>
</head>

<script>

// CONFIGURACIÓN DEL BACKEND (Google Sheets vía Apps Script)
// Pega aquí la URL que te da Google al desplegar el Web App (termina en /exec)

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzcqZ7mFMej_s4IhGgnU1NqUMA94dxcOyUWkYERSNvbGMdogbPsDR_0MmReMidxkON3nA/exec';

async function gasGet(action, extraParams){
  const params = new URLSearchParams({ action, ...(extraParams||{}) });
  const res = await fetch(`${GAS_URL}?${params.toString()}`);
  if(!res.ok) throw new Error('Error de red al leer');
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}
async function gasPost(payload){
  const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) });
  if(!res.ok) throw new Error('Error de red al guardar');
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}
// ---------- Folio ----------
document.getElementById('fecha').valueAsDate = new Date();
(function(){
  const d=new Date(); const hh=String(d.getHours()).padStart(2,'0'); const mm=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('hora').value = hh+':'+mm;
})();

// ---------- Declaration table definition ----------

];

let declCounter = 0;
let lastGroupTitle = null;

  if(group.title !== lastGroupTitle){
    const tr = document.createElement('tr');
    tr.className = 'decl-group-row';
    tr.innerHTML = `<td colspan="3">${group.title}</td>`;
    declBody.appendChild(tr);
    lastGroupTitle = group.title;
  }
  group.items.forEach(item=>{
    declCounter++;
    const opts = OPTION_SETS[group.type];
    const optionsHtml = opts.map(([val,label])=>`<option value="${val}">${label}</option>`).join('');
    const tr = document.createElement('tr');
    tr.dataset.item = item;
    tr.innerHTML = `
      <td class="comp-cell">${item}</td>
      <td><select class="decl-select" data-item="${item}">${optionsHtml}</select></td>
      <td><input type="text" class="detalle" placeholder="Ingresar detalle a mano…"></td>
    `;
    declBody.appendChild(tr);
  });
});

declBody.addEventListener('change', (e)=>{
  const sel = e.target.closest('.decl-select');
  if(!sel) return;
  Object.values(VALCLASS).forEach(c=>sel.classList.remove(c));
  const cls = VALCLASS[sel.value];
  if(cls) sel.classList.add(cls);
  updateProgress();
  updateResult();
});

// ---------- Progress ----------
function updateProgress(){
  const reqFields = Array.from(document.querySelectorAll('.req'));
  const filledFields = reqFields.filter(f => f.value && f.value.trim() !== '').length;

  const selects = Array.from(document.querySelectorAll('.decl-select'));
  const answeredSelects = selects.filter(s => s.value).length;

  const total = reqFields.length + selects.length;
  const done = filledFields + answeredSelects;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '% completado';
  document.getElementById('progressCount').textContent = done + ' / ' + total + ' campos';
}
document.querySelectorAll('.req').forEach(f=>{
  f.addEventListener('input', updateProgress);
  f.addEventListener('change', updateProgress);
});

// ---------- Result banner ----------
function updateResult(){
  const selects = Array.from(document.querySelectorAll('.decl-select'));
  const negative = ["No","Mala","No se realiza"];
  const badCount = selects.filter(s => negative.includes(s.value)).length;
  const answered = selects.filter(s => s.value).length;

  const banner = document.getElementById('resultBanner');
  const label = document.getElementById('resultLabel');
  const sub = document.getElementById('resultSub');
  const cts = document.getElementById('resultCounts');

  cts.textContent = `${answered} / ${selects.length} puntos evaluados · ${badCount} con observación`;

  if(answered === 0){
    banner.className = 'result-banner';
    label.textContent = 'Sin evaluar todavía';
    sub.textContent = 'Completa los puntos a declarar para ver el resultado general.';
    return;
  }
  if(badCount > 0){
    banner.className = 'result-banner warn';
    label.textContent = 'Recibido con observaciones';
    sub.textContent = 'Hay puntos declarados como No / Mala / No se realiza: revisa el detalle antes de liberar el vehículo.';
  } else {
    banner.className = 'result-banner ok';
    label.textContent = 'Recibido sin novedad';
    sub.textContent = 'Todos los puntos evaluados están conformes.';
  }
}

// ---------- Actions ----------
document.getElementById('printBtn').addEventListener('click', ()=> window.print());

document.getElementById('excelBtn').addEventListener('click', ()=>{
  try{
    const placas = document.getElementById('placas').value.trim() || 'SIN-PATENTE';
    const fecha = document.getElementById('fecha').value || '';
    const hora = document.getElementById('hora').value || '';

    const negative = ["No","Mala","No se realiza"];
    const selects = Array.from(document.querySelectorAll('.decl-select'));
    const answered = selects.filter(s=>s.value).length;
    const badCount = selects.filter(s=>negative.includes(s.value)).length;
    const resultado = answered === 0 ? 'Sin evaluar' : (badCount > 0 ? 'Recibido con observaciones' : 'Recibido sin novedad');

    // Sheet 1: datos generales
    const general = [
      ['Campo', 'Valor'],
      ['Patente', placas],
      ['Marca', document.getElementById('marca').value],
      ['Modelo', document.getElementById('modelo').value],
      ['Año', document.getElementById('anio').value],
      ['Fecha', fecha],
      ['Hora', hora],
      ['Km actual', document.getElementById('km').value],
      ['Conductor', document.getElementById('conductor').value],
      ['Resultado general', resultado],
      ['Detalles de entrega', document.getElementById('observaciones').value]
    ];

    // Sheet 2: puntos a declarar
    const rows = document.querySelectorAll('#declBody tr[data-item]');
    const decl = [['Componente','Opción','Detalle']];
    rows.forEach(tr=>{
      const item = tr.dataset.item;
      const sel = tr.querySelector('.decl-select');
      const det = tr.querySelector('.detalle');
      decl.push([item, sel ? sel.value : '', det ? det.value : '']);
    });

    const wb = XLSX.utils.book_new();
    const wsGeneral = XLSX.utils.aoa_to_sheet(general);
    wsGeneral['!cols'] = [{wch:22},{wch:40}];
    const wsDecl = XLSX.utils.aoa_to_sheet(decl);
    wsDecl['!cols'] = [{wch:24},{wch:16},{wch:40}];
    XLSX.utils.book_append_sheet(wb, wsGeneral, 'Recepción');
    XLSX.utils.book_append_sheet(wb, wsDecl, 'Puntos declarados');

    const safePlaca = placas.replace(/[^A-Z0-9]/gi,'');
    const filename = `Recepcion_${safePlaca}_${fecha || 'sinfecha'}.xlsx`;
    XLSX.writeFile(wb, filename);
    showToast('Excel descargado: ' + filename);
  }catch(err){
    console.error(err);
    alert('No se pudo generar el Excel. Revisa que hayas completado al menos la patente y la fecha.');
  }
});

document.getElementById('guardarBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('guardarBtn');
  const placas = document.getElementById('placas').value.trim();
  const fecha = document.getElementById('fecha').value || '';
  if(!placas || !fecha){ alert('Completa al menos la patente y la fecha antes de guardar.'); return; }
  if(GAS_URL.includes('PEGA_AQUI')){ showToast('Falta configurar GAS_URL con la URL de tu Apps Script.'); return; }

  const negative = ["No","Mala","No se realiza"];
  const selects = Array.from(document.querySelectorAll('.decl-select'));
  const answered = selects.filter(s=>s.value).length;
  const badCount = selects.filter(s=>negative.includes(s.value)).length;
  const resultado = answered === 0 ? 'Sin evaluar' : (badCount > 0 ? 'Recibido con observaciones' : 'Recibido sin novedad');

  const puntos = Array.from(document.querySelectorAll('#declBody tr[data-item]')).map(tr=>{
    const sel = tr.querySelector('.decl-select');
    const det = tr.querySelector('.detalle');
    return { item: tr.dataset.item, opcion: sel ? sel.value : '', detalle: det ? det.value : '' };
  });

  const observados = puntos.filter(p=>negative.includes(p.opcion)).map(p=>{
    let line = p.item;
    if(p.detalle) line += `: ${p.detalle}`;
    return line;
  }).join(' | ');

  const payload = {
    placas, fecha,
    hora: document.getElementById('hora').value || '',
    marca: document.getElementById('marca').value,
    modelo: document.getElementById('modelo').value,
    anio: document.getElementById('anio').value,
    km: document.getElementById('km').value,
    conductor: document.getElementById('conductor').value,
    resultado,
    observaciones: document.getElementById('observaciones').value,
    observados,
    puntos: JSON.stringify(puntos)
  };

  btn.disabled = true; btn.textContent = 'Guardando…';
  try{
    await saveReception(payload);
    showToast('Recepción guardada en el registro compartido.');
  }catch(err){
    alert('No se pudo guardar la recepción: ' + err.message);
  }finally{
    btn.disabled = false; btn.textContent = 'Guardar recepción';
  }
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('¿Seguro que quieres reiniciar el formulario? Se perderá todo lo capturado.')) return;
  document.querySelectorAll('input[type=text], input[type=number], textarea').forEach(el=>{ if(!el.readOnly) el.value=''; });
  document.getElementById('marca').value=''; document.getElementById('modelo').value=''; document.getElementById('anio').value='';
  document.getElementById('placas').value=''; document.getElementById('conductor').value='';
  document.querySelectorAll('.decl-select').forEach(s=>{ s.value=''; Object.values(VALCLASS).forEach(c=>s.classList.remove(c)); });
  document.getElementById('fecha').valueAsDate = new Date();
  setPlateStatus('', '');
  updateProgress(); updateResult();
});

updateProgress();
updateResult();

// ---------- Fleet registry (shared, persistent) ----------
const REGISTRY_KEY = 'flotilla-registro';
const DRIVERS_KEY = 'conductores-registro';
let registry = {};
let drivers = [];
let registryReady = false;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=> t.classList.remove('show'), 2400);
}

function normalizePlate(v){
  return (v || '').toUpperCase().replace(/[\s-]+/g,'').trim();
}

async function loadRegistry(){
  if(GAS_URL.includes('PEGA_AQUI')){
    showToast('Falta configurar GAS_URL con la URL de tu Apps Script.');
    registry = {}; drivers = []; registryReady = true;
    renderPlateOptions(); renderDriverOptions();
    return;
  }
  try{
    const res = await gasGet('getRegistry');
    registry = res.registry || {};
  }catch(err){ registry = {}; showToast('No se pudo cargar la flotilla: ' + err.message); }
  try{
    const res2 = await gasGet('getDrivers');
    drivers = res2.drivers || [];
  }catch(err){ drivers = []; }
  registryReady = true;
  renderPlateOptions();
  renderDriverOptions();
}

async function saveReception(payload){
  return await gasPost({ action:'saveReception', ...payload });
}

function renderPlateOptions(){
  const sel = document.getElementById('placas');
  const current = sel.value;
  const plates = Object.keys(registry).sort();
  sel.innerHTML = '<option value="">Selecciona…</option>' + plates.map(p=>`<option value="${p}">${p}</option>`).join('');
  if(plates.includes(current)) sel.value = current;
}
function renderDriverOptions(){
  const sel = document.getElementById('conductor');
  const current = sel.value;
  const list = drivers.slice().sort();
  sel.innerHTML = '<option value="">Selecciona…</option>' + list.map(d=>`<option value="${d}">${d}</option>`).join('');
  if(list.includes(current)) sel.value = current;
}

function applyVehicleToForm(v){
  document.getElementById('marca').value = v.marca || '';
  document.getElementById('modelo').value = v.modelo || '';
  document.getElementById('anio').value = v.anio || '';
  updateProgress();
}

function setPlateStatus(kind, text){
  const el = document.getElementById('plateStatus');
  el.className = 'plate-status' + (kind ? ' ' + kind : '');
  el.innerHTML = kind ? `<span class="dot"></span>${text}` : '';
}

function handlePlateInput(){
  const key = normalizePlate(document.getElementById('placas').value);
  if(!key){ setPlateStatus('', ''); document.getElementById('marca').value=''; document.getElementById('modelo').value=''; document.getElementById('anio').value=''; return; }
  if(registry[key]){
    applyVehicleToForm(registry[key]);
    setPlateStatus('found', 'Vehículo reconocido: datos autocompletados');
  } else {
    document.getElementById('marca').value=''; document.getElementById('modelo').value=''; document.getElementById('anio').value='';
    setPlateStatus('', '');
  }
}
document.getElementById('placas').addEventListener('change', handlePlateInput);

loadRegistry();
</script>
